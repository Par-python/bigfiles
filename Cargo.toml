[package]
name = "bigfiles"
version = "0.1.1"
edition = "2021"

[dependencies]
walkdir    = "2"
clap       = { version = "4", features = ["derive"] }
owo-colors = "4"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
blake3     = "1"
dialoguer  = "0.11"

[profile.release]
lto = true
codegen-units = 1
